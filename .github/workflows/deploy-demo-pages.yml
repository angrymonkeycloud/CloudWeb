name: Deploy CloudWeb Demo

on:
  push:
    branches:
      - main
    paths:
      - 'CloudWeb.Demo/**'
      - 'CloudWeb/**'
      - 'CloudWeb.Tests/**'
      - '.github/workflows/deploy-demo-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CloudWeb.sln

      - name: Run tests
        run: dotnet test CloudWeb.Tests/CloudWeb.Tests.csproj -c Release --no-restore

      - name: Publish demo server
        run: dotnet publish CloudWeb.Demo/CloudWeb.Demo.csproj -c Release -o publish

      - name: Render static pages for GitHub Pages
        shell: bash
        run: |
          mkdir -p site
          cp -R publish/wwwroot/. site/

          dotnet publish/CloudWeb.Demo.dll --urls http://127.0.0.1:5079 &
          APP_PID=$!

          for i in {1..30}; do
            if curl -sf http://127.0.0.1:5079/ > /dev/null; then
              break
            fi
            sleep 1
          done

          declare -a ROUTES=("" "metadata" "bundles" "features" "robots" "crawler")

          for route in "${ROUTES[@]}"; do
            if [ -z "$route" ]; then
              out="site/index.html"
              url="http://127.0.0.1:5079/"
            else
              mkdir -p "site/$route"
              out="site/$route/index.html"
              url="http://127.0.0.1:5079/$route"
            fi

            curl -sf "$url" -o "$out"

            sed -i 's|<base href="/" />|<base href="/CloudWeb/" />|g' "$out"
            sed -i '/_framework\/blazor\.web\.js/d' "$out"
          done

          cp site/index.html site/404.html

          kill $APP_PID

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
